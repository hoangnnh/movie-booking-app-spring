spring.datasource.url=jdbc:h2:mem:cinema_booking_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=false

app.seed.data.enabled=false
app.postgres-search.enabled=false
app.tmdb.sync.enabled=false
app.tmdb.sync.cast.enabled=false
app.tmdb.sync.run-on-startup=false
app.email.console-fallback=true
