spring.application.name=cinema-booking-server
spring.config.import=optional:file:.env.local[.properties],optional:file:backend/.env.local[.properties]

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:6543/movie_booking_app}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DATABASE_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DATABASE_MIN_IDLE:1}
spring.datasource.hikari.data-source-properties.prepareThreshold=0

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}

server.port=8080

tmdb.api.base-url=https://api.themoviedb.org/3
tmdb.api.image-base-url=https://image.tmdb.org/t/p/w500
tmdb.api.read-access-token=${TMDB_API_READ_ACCESS_TOKEN:}
tmdb.api.region=${TMDB_REGION:VN}

jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-value}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.base-url=${APP_BACKEND_BASE_URL:http://localhost:8080}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.frontend.oauth-success-url=http://localhost:5173/oauth/callback
app.frontend.oauth-failure-url=http://localhost:5173/oauth/callback
app.email.from=${APP_EMAIL_FROM:}
app.email.provider=${APP_EMAIL_PROVIDER:auto}
app.email.resend.api-key=${APP_EMAIL_RESEND_API_KEY:}
app.email.resend.base-url=${APP_EMAIL_RESEND_BASE_URL:https://api.resend.com}
app.email.console-fallback=${APP_EMAIL_CONSOLE_FALLBACK:false}

payment.vnpay.enabled=${PAYMENT_VNPAY_ENABLED:false}
payment.vnpay.pay-url=${PAYMENT_VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
payment.vnpay.tmn-code=${PAYMENT_VNPAY_TMN_CODE:}
payment.vnpay.hash-secret=${PAYMENT_VNPAY_HASH_SECRET:}
payment.momo.enabled=${PAYMENT_MOMO_ENABLED:false}
payment.momo.create-url=${PAYMENT_MOMO_CREATE_URL:https://test-payment.momo.vn/v2/gateway/api/create}
payment.momo.partner-code=${PAYMENT_MOMO_PARTNER_CODE:}
payment.momo.access-key=${PAYMENT_MOMO_ACCESS_KEY:}
payment.momo.secret-key=${PAYMENT_MOMO_SECRET_KEY:}

app.seed.tmdb.enabled=${APP_SEED_TMDB_ENABLED:false}
app.seed.tmdb.lists=${APP_SEED_TMDB_LISTS:now_playing,popular,upcoming}
app.seed.tmdb.pages-per-list=${APP_SEED_TMDB_PAGES_PER_LIST:2}
app.seed.showtimes.movie-limit=${APP_SEED_SHOWTIMES_MOVIE_LIMIT:18}
app.seed.showtimes.slots-per-movie=${APP_SEED_SHOWTIMES_SLOTS_PER_MOVIE:3}

app.tmdb.sync.enabled=${APP_TMDB_SYNC_ENABLED:false}
app.tmdb.sync.cron=${APP_TMDB_SYNC_CRON:0 */30 * * * *}
app.tmdb.sync.lists=${APP_TMDB_SYNC_LISTS:now_playing,popular,upcoming}
app.tmdb.sync.pages-per-list=${APP_TMDB_SYNC_PAGES_PER_LIST:2}
app.tmdb.sync.cast.enabled=${APP_TMDB_SYNC_CAST_ENABLED:false}
app.tmdb.sync.run-on-startup=${APP_TMDB_SYNC_RUN_ON_STARTUP:false}
app.tmdb.trailer-backfill.enabled=${APP_TMDB_TRAILER_BACKFILL_ENABLED:false}
app.tmdb.trailer-backfill.exit-after-run=${APP_TMDB_TRAILER_BACKFILL_EXIT_AFTER_RUN:false}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
