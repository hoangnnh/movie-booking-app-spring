# Production profile: schema is managed only by Flyway; Hibernate must not mutate tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=true

# Disable local demo seeding in production unless explicitly enabled.
app.seed.data.enabled=false
app.seed.tmdb.enabled=false
